<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>W3Reproductor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100vh;overflow:hidden;
  background:#060a07;color:#ddd;
  font-family:system-ui,-apple-system,sans-serif;
}
body{display:grid;grid-template-rows:40px 1fr 56px;}

/* ── Topbar ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
  background:linear-gradient(180deg,#1a1208,#0e0c08);
  border-bottom:1px solid #2a2010;
  flex-shrink:0;
}
#topbar h1{font-family:Georgia,serif;font-size:14px;color:#d4a840;letter-spacing:.3px;}
#topbar h1 span{font-size:10px;color:#7a6840;font-family:system-ui,sans-serif;font-weight:400;}
.tb-r{display:flex;align-items:center;gap:8px;}
#status{font-family:Consolas,monospace;font-size:10px;color:#7a6840;max-width:400px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.btn{
  font-family:inherit;font-size:11px;font-weight:600;
  border-radius:4px;border:1px solid #3a2e18;
  background:#1e1808;color:#ccc;padding:5px 10px;cursor:pointer;
}
.btn:hover{border-color:#d4a840;color:#e8c870;}
.btn-gold{background:#c9a44a;color:#0e0c08;border-color:#c9a44a;}
.btn-gold:hover{background:#e8c870;}

/* ── Canvas area ── */
#carea{position:relative;overflow:hidden;background:#060a07;cursor:grab;}
#carea:active{cursor:grabbing;}
#cv{display:block;}

/* Error / info overlay */
#overlay{
  position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:12px;
  text-align:center;pointer-events:none;
  background:rgba(6,10,7,.92);
}
#overlay.hidden{display:none;}
#overlay .oi{font-size:36px;opacity:.3;}
#overlay .ot{font-size:15px;color:#7a6840;font-family:Georgia,serif;}
#overlay .os{font-size:11px;color:#4a3e20;line-height:1.6;}

/* Error mensaje en canvas */
#errmsg{
  position:absolute;bottom:8px;left:0;right:0;text-align:center;
  font-family:Consolas,monospace;font-size:10px;color:#c04040;
  pointer-events:none;
}

/* ── Timeline ── */
#tl{
  display:flex;align-items:center;gap:8px;
  padding:0 12px;
  background:#0e0c08;border-top:1px solid #2a2010;
}
#tltime{font-family:Consolas,monospace;font-size:11px;color:#7a6840;width:76px;text-align:center;flex-shrink:0;}
#swrap{flex:1;position:relative;height:18px;display:flex;align-items:center;}
#strack{position:absolute;left:0;right:0;height:3px;background:#2a2010;border-radius:2px;pointer-events:none;}
#sfill{position:absolute;left:0;top:0;bottom:0;background:#6a5020;border-radius:2px;pointer-events:none;transition:width .05s linear;}
#seek{position:absolute;left:0;right:0;width:100%;height:18px;appearance:none;background:transparent;outline:none;cursor:pointer;z-index:1;}
#seek::-webkit-slider-thumb{appearance:none;width:12px;height:12px;border-radius:50%;background:#d4a840;border:2px solid #060a07;box-shadow:0 0 5px rgba(212,168,64,.5);}
#sg{display:flex;gap:2px;}
.sb{font-family:Consolas,monospace;font-size:9px;border:1px solid #2a2010;background:transparent;color:#666;border-radius:3px;padding:3px 5px;cursor:pointer;}
.sb.on{background:#c9a44a;color:#0e0c08;border-color:#c9a44a;}
#fi{display:none;}
</style>
</head>
<body>

<div id="topbar">
  <h1>W3Reproductor <span>· Survival Chaos</span></h1>
  <div class="tb-r">
    <span id="status">Cargá un replay .w3g para comenzar</span>
    <button class="btn" id="zin">＋</button>
    <button class="btn" id="zout">－</button>
    <button class="btn" id="zres">⊙</button>
    <button class="btn" id="fsb">⛶</button>
    <button class="btn btn-gold" id="openbtn">Cargar Replay</button>
  </div>
  <input type="file" id="fi" accept=".w3g">
</div>

<div id="carea">
  <canvas id="cv"></canvas>
  <div id="overlay">
    <div class="oi">⚔</div>
    <div class="ot">Survival Chaos Replay Viewer</div>
    <div class="os">Cargá un archivo <strong style="color:#6a5020">.w3g</strong> para ver la repetición<br>Zoom con la rueda del mouse · Arrastrar para mover</div>
  </div>
  <div id="errmsg"></div>
</div>

<div id="tl">
  <button class="btn" id="pp" style="width:26px;height:26px;border-radius:50%;padding:0;font-size:11px;flex-shrink:0">▶</button>
  <span id="tltime">0:00 / 0:00</span>
  <div id="swrap">
    <div id="strack"></div>
    <div id="sfill"></div>
    <input type="range" id="seek" min="0" max="10000" value="0">
  </div>
  <div id="sg">
    <button class="sb" data-s=".25">¼x</button>
    <button class="sb" data-s=".5">½x</button>
    <button class="sb on" data-s="1">1x</button>
    <button class="sb" data-s="2">2x</button>
    <button class="sb" data-s="4">4x</button>
    <button class="sb" data-s="8">8x</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONSTANTES SC
// ══════════════════════════════════════════════════════

// Colores de slots WC3
const SLOT_COLORS=[
  {h:'#FF0303',g:'rgba(255,60,60,.6)'},
  {h:'#0042FF',g:'rgba(0,100,255,.6)'},
  {h:'#1CE6B9',g:'rgba(28,230,185,.6)'},
  {h:'#9B4DCA',g:'rgba(155,77,202,.6)'},
  {h:'#FFFC01',g:'rgba(255,252,1,.6)'},
  {h:'#fEBA0E',g:'rgba(254,186,14,.6)'},
  {h:'#20C000',g:'rgba(32,192,0,.6)'},
  {h:'#E55BB0',g:'rgba(229,91,176,.6)'},
  {h:'#959697',g:'rgba(149,150,151,.6)'},
  {h:'#7EBFF1',g:'rgba(126,191,241,.6)'},
  {h:'#106246',g:'rgba(16,98,70,.6)'},
  {h:'#8C5A28',g:'rgba(140,90,40,.6)'},
];

// Acciones relevantes para SC
// En SC los jugadores principalmente usan 0x07 (orden sin objetivo):
// - Entrenar unidades/héroes en barracas
// - Investigar mejoras en estructuras
// Y 0x08 (orden con objetivo): dirigir ataque de torre a unidad enemiga cercana
const ASIZES={
  0x01:0,0x02:0,0x03:0,0x04:0,
  0x07:14,  // Orden sin objetivo: entrenar/investigar/enviar (SC principal)
  0x08:22,  // Orden con objetivo: dirigir ataque de torre
  0x09:30,0x0A:22,
  0x12:9,0x13:4,0x14:5,0x16:4,0x18:8,0x19:4,
  0x1A:10,0x1B:0,0x1C:9,0x1D:12,0x1E:12,
  0x50:5,0x51:13,0x60:8,0x6B:4,0x6D:5,0x70:0,0x71:4,
};

// Clasificación por tipo visual en SC
function classifyAction(aid){
  if(aid===0x07) return{cat:'train',    label:'⚔ Entrenar / Investigar', pulse:true,  ring:false};
  if(aid===0x08) return{cat:'attack',   label:'🎯 Dirigir ataque',        pulse:false, ring:true };
  if(aid===0x14) return{cat:'cancel',   label:'✖ Cancelar',               pulse:false, ring:false};
  if(aid===0x01) return{cat:'system',   label:'⏸ Pausa',                  pulse:false, ring:false};
  if(aid===0x65||aid===0x66) return{cat:'chat', label:'💬 Chat',           pulse:false, ring:false};
  if(aid===0x6D) return{cat:'leave',    label:'🚪 Sale',                   pulse:false, ring:false};
  return{cat:'other', label:`Acción 0x${aid.toString(16)}`, pulse:false, ring:false};
}

// ══════════════════════════════════════════════════════
// INFLATE — writer/reader con await correcto
// ══════════════════════════════════════════════════════
async function inflate(data,expectedSize){
  // Los bloques de un replay usan Z_SYNC_FLUSH (para poder transmitirse en vivo),
  // por lo que el stream nunca llega a un BFINAL/checksum final: wr.close() siempre
  // falla con "truncated". En cambio, leemos hasta juntar expectedSize bytes.
  const errs=[];
  for(const fmt of['deflate','deflate-raw']){
    try{
      const ds  = new DecompressionStream(fmt);
      const wr  = ds.writable.getWriter();
      const rd  = ds.readable.getReader();
      wr.write(data).catch(()=>{});
      const chunks=[];let total=0;
      while(total<expectedSize){
        const{done,value}=await rd.read();
        if(done)break;
        chunks.push(value);total+=value.length;
      }
      wr.abort().catch(()=>{});
      if(total<expectedSize) throw new Error(`solo ${total}/${expectedSize} bytes`);
      const out=new Uint8Array(total);let o=0;
      for(const c of chunks){out.set(c,o);o+=c.length;}
      return out;
    }catch(e){errs.push(`${fmt}:${e.message}`);}
  }
  throw new Error('inflate falló: '+errs.join(' | '));
}

// ══════════════════════════════════════════════════════
// W3G PARSER
// ══════════════════════════════════════════════════════
async function parseW3G(file){
  const buf  = await file.arrayBuffer();
  const dv   = new DataView(buf);
  const by   = new Uint8Array(buf);

  // Verificar magic
  let magic='';
  for(let i=0;i<27;i++) magic+=String.fromCharCode(by[i]);
  if(!magic.startsWith('Warcraft III recorded game'))
    throw new Error('No es un archivo .w3g válido de Warcraft III');

  const hSz  = dv.getUint32(0x1C,true);
  const hVer = dv.getUint32(0x24,true);
  const nBlk = dv.getUint32(0x2C,true);

  let dur=0, build=0;
  if(hVer===1){build=dv.getUint16(0x38,true); dur=dv.getUint32(0x3C,true);}
  else         {build=dv.getUint16(0x34,true); dur=dv.getUint32(0x38,true);}

  console.log(`[W3G] ver=${hVer} hSz=${hSz} nBlk=${nBlk} dur=${dur}ms build=${build}`);

  // Los nombres de jugadores no están en el header crudo: viven dentro del
  // primer bloque ya descomprimido.
  const b0cSz=dv.getUint32(hSz,true), b0dSz=dv.getUint32(hSz+4,true);
  const blk0 =await inflate(by.slice(hSz+12,hSz+12+b0cSz),b0dSz);
  const players = parseHeader(blk0,new DataView(blk0.buffer,blk0.byteOffset,blk0.byteLength),0,blk0.length);
  const events  = await parseBlocks(by,dv,hSz,nBlk);

  return{dur,build,players,events};
}

function parseHeader(by,dv,start,hSz){
  const dec  = new TextDecoder('utf-8',{fatal:false});
  const rStr = o=>{let e=o;while(e<by.length&&by[e]!==0)e++;return{s:dec.decode(by.slice(o,e)),nx:e+1};};
  const rPl  = o=>{const id=by[o++];const{s,nx}=rStr(o);o=nx;o+=by[o]+1;return{id,s,nx:o};};
  const pm   = new Map();
  let off=start;

  while(off<hSz-2){
    const rt=by[off];
    if(rt===0x16){
      off++;
      const{id,s,nx}=rPl(off); off=nx;
      if(s) pm.set(id,{id,name:s,color:0,ch:'#888',cg:'rgba(136,136,136,.5)',team:0,cpu:false});
    }
    else if(rt===0x19){
      off++; off++; // skip pid
      const{nx:n1}=rStr(off);off=n1;
      const{nx:n2}=rStr(off);off=n2;
      const{nx:n3}=rStr(off);off=n3;
    }
    else if(rt===0x1A){
      off++;
      const{nx:n1}=rStr(off);off=n1;  // game name
      while(off<hSz&&by[off]!==0)off++;off++;  // private string
      while(off<hSz&&by[off]!==0)off++;off++;  // encoded settings
      if(off+13>=hSz)break;
      const pc=dv.getUint32(off,true);off+=8;off+=4; // pc + gametype + langid
      for(let i=0;i<pc;i++){
        if(off+9>hSz)break;
        const pid=by[off],st=by[off+1],cpu=by[off+2],team=by[off+3],col=by[off+4];
        off+=9;
        if(st===2&&pm.has(pid)){
          const p=pm.get(pid);
          p.team=team; p.color=col;
          p.ch  =SLOT_COLORS[col]?.h??'#888';
          p.cg  =SLOT_COLORS[col]?.g??'rgba(136,136,136,.5)';
          p.cpu =cpu===1;
        }
      }
      break;
    }
    else if(rt===0x39){break;}
    else{off++;}
  }
  return Array.from(pm.values());
}

async function parseBlocks(by,dv,hSz,nBlk){
  const events=[];
  let off=hSz, tMs=0, blocksOk=0, blocksFail=0;

  for(let b=0;b<nBlk;b++){
    if(off+12>by.length)break;
    const cSz=dv.getUint32(off,true);
    const dSz=dv.getUint32(off+4,true);
    off+=12;
    if(cSz===0||off+cSz>by.length){off+=cSz;continue;}

    let blk;
    try{
      blk=await inflate(by.slice(off,off+cSz),dSz);
      blocksOk++;
    }catch(e){
      if(blocksFail<3) console.warn(`[W3G] Block ${b} inflate fail:`,e.message,
        `first4bytes:`,Array.from(by.slice(off,off+4)).map(x=>x.toString(16)).join(' '));
      blocksFail++;
      off+=cSz; continue;
    }
    off+=cSz;

    const bv=new DataView(blk.buffer,blk.byteOffset,blk.byteLength);
    let bo=0;

    while(bo<blk.length){
      const rt=blk[bo];
      if(rt===0x17||rt===0x1A){
        bo++;
        if(bo+4>blk.length)break;
        const blen=bv.getUint16(bo,true); bo+=2;
        tMs+=bv.getUint16(bo,true);       bo+=2;
        const ae=bo+blen-2;

        while(bo<ae&&bo+3<=blk.length){
          const pid   =blk[bo++];
          const abLen =bv.getUint16(bo,true); bo+=2;
          if(abLen===0||bo+abLen>blk.length){bo+=abLen;break;}
          const abEnd =bo+abLen; let ai=bo;

          while(ai<abEnd){
            const aid=blk[ai++];
            // Acciones de tamaño variable
            if(aid===0x05){while(ai<abEnd&&blk[ai]!==0)ai++;ai+=5;continue;}
            if(aid===0x06){ai+=4;continue;}
            if(aid===0x11){if(ai+2>abEnd)break;const c=bv.getUint16(ai,true);ai+=2+c*8;continue;}
            if(aid===0x65||aid===0x66){ai+=8;while(ai<abEnd&&blk[ai]!==0)ai++;ai++;continue;}

            const ps=ASIZES[aid]??null;
            if(ps!==null){
              const info=classifyAction(aid);
              // Para SC: solo guardamos acciones significativas
              // (filtramos selección de unidades y otras acciones menores)
              if(aid!==0x11&&aid!==0x1B&&aid!==0x1A&&aid!==0x1C){
                events.push({t:tMs, pid, aid, cat:info.cat, label:info.label,
                              pulse:info.pulse, ring:info.ring});
              }
              ai+=ps;
            }else{
              ai=abEnd; // acción desconocida, saltar
            }
          }
          bo=abEnd;
        }
        bo=Math.max(bo,ae);
      }
      else if(rt===0x20||rt===0x22||rt===0x23){bo+=5;}
      else if(rt===0x2F){bo+=9;}
      else if(rt===0x1B){bo+=5;}
      else{bo++;}
    }
  }
  console.log(`[W3G] Blocks ok=${blocksOk} fail=${blocksFail} events=${events.length}`);
  return events;
}

// ══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════════════════
const S={
  loaded:false, dur:0, players:[], events:[],
  ct:0, playing:false, speed:1,
  zoom:1, px:0, py:0,
  drag:false, dsx:0, dsy:0, dpx:0, dpy:0,
  // posiciones base calculadas para cada jugador (fracciones 0-1 del canvas)
  bases:{},
};

// ══════════════════════════════════════════════════════
// CANVAS Y RENDER
// ══════════════════════════════════════════════════════
const ca  = document.getElementById('carea');
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

// Terreno real de Survival Chaos, extraído de war3map.w3e (grilla de 95x95

const TERRAIN_COLORS=['#241c0e','#2a2010','#1c2410','#2a2a28','#16260f','#241f14'];
const WATER_COLOR='#0f2535';
function unpackTerrain(b64){
  const bin=atob(b64);
  const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const grid=[];
  let idx=0;
  for(let row=0;row<TERRAIN_H;row++){
    const rowArr=[];
    for(let col=0;col<TERRAIN_W;col++){
      const byteIdx=idx>>1;
      rowArr.push((idx&1)===0 ? (bytes[byteIdx]>>4) : (bytes[byteIdx]&0x0F));
      idx++;
    }
    grid.push(rowArr);
  }
  return grid.reverse();
}
const terrainGrid=unpackTerrain(TERRAIN_B64);

function drawTerrain(){
  const W=cv.width, H=cv.height;
  const cellW=(W*S.zoom)/TERRAIN_W, cellH=(H*S.zoom)/TERRAIN_H;
  const startCol=Math.max(0, Math.floor(-S.px/cellW));
  const endCol=Math.min(TERRAIN_W, Math.ceil((W-S.px)/cellW));
  const startRow=Math.max(0, Math.floor(-S.py/cellH));
  const endRow=Math.min(TERRAIN_H, Math.ceil((H-S.py)/cellH));
  for(let row=startRow; row<endRow; row++){
    for(let col=startCol; col<endCol; col++){
      const v=terrainGrid[row][col];
      ctx.fillStyle = (v&1) ? WATER_COLOR : TERRAIN_COLORS[v>>1];
      ctx.fillRect(col*cellW+S.px-1, row*cellH+S.py-1, cellW+1, cellH+1);
    }
  }
}

function resizeCanvas(){
  cv.width  = ca.clientWidth;
  cv.height = ca.clientHeight;
}

// Survival Chaos tiene 4 bases/carriles dispuestos en cuadrantes simétricos
// (ver survival-chaos-minimap.jpg). El replay no trae el equipo real de cada
// jugador (Reforged codifica esa tabla en un formato no documentado), así que
// se asigna un cuadrante por jugador en vez de por equipo.
const QUADRANTS=[{fx:.25,fy:.25},{fx:.75,fy:.25},{fx:.25,fy:.75},{fx:.75,fy:.75}];
function calcBases(players){
  S.bases={};
  players.forEach((p,i)=>{ S.bases[p.id]=QUADRANTS[i%QUADRANTS.length]; });
}

// Convierte fracción del mapa a px del canvas con zoom/pan
function frac2px(fx,fy){
  return[fx*cv.width*S.zoom+S.px, fy*cv.height*S.zoom+S.py];
}

// Eventos recientes de un jugador para animar
function recentEvents(pid, t, windowMs=1500){
  return S.events.filter(e=>e.pid===pid&&e.t<=t&&e.t>=(t-windowMs));
}

function draw(){
  const W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Fondo: terreno real recreado a partir de la grilla de war3map.w3e
  ctx.fillStyle='#040906';
  ctx.fillRect(0,0,W,H);
  drawTerrain();

  if(!S.loaded) return;

  const t=S.ct;
  const now=performance.now();

  for(const p of S.players){
    const base=S.bases[p.id];
    if(!base) continue;
    const[bx,by]=frac2px(base.fx, base.fy);
    const col=p.ch, glow=p.cg;

    // Obtener acciones recientes
    const recent=recentEvents(p.id, t, 1800);
    const hasPulse=recent.some(e=>e.pulse);
    const hasRing =recent.some(e=>e.ring);

    // Radio base del indicador (escala con zoom)
    const r=Math.max(8, 12*Math.min(S.zoom,2));

    // Anillo exterior cuando hay acción
    if(hasPulse){
      // Anillo pulsante que se expande
      const newestPulse=recent.filter(e=>e.pulse).at(-1);
      if(newestPulse){
        const age=t-newestPulse.t;
        const progress=Math.min(1, age/1800);
        const outerR=r+(r*2.5)*progress;
        const alpha=(1-progress)*0.7;
        ctx.strokeStyle=col+Math.round(alpha*255).toString(16).padStart(2,'0');
        ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(bx,by,outerR,0,Math.PI*2);ctx.stroke();
      }
    }

    // Indicador de ataque dirigido (ring fijo)
    if(hasRing){
      ctx.strokeStyle=col+'aa';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(bx,by,r+6,0,Math.PI*2);ctx.stroke();
    }

    // Halo de color (glow)
    const gr=ctx.createRadialGradient(bx,by,0,bx,by,r*2.2);
    gr.addColorStop(0,glow);
    gr.addColorStop(1,'transparent');
    ctx.fillStyle=gr;
    ctx.beginPath();ctx.arc(bx,by,r*2.2,0,Math.PI*2);ctx.fill();

    // Círculo del jugador
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();

    // Borde
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.stroke();

    // Nombre
    const fs=Math.max(9,11*Math.min(S.zoom,1.5));
    ctx.fillStyle=col;
    ctx.font=`bold ${fs}px system-ui,sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(p.name, bx, by-r-4);

    // Última acción (texto breve)
    if(recent.length>0){
      const last=recent[recent.length-1];
      const age=t-last.t;
      const alpha=Math.max(0,(1800-age)/1800);
      ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
      ctx.font=`${Math.max(8,10*Math.min(S.zoom,1.5))}px system-ui,sans-serif`;
      ctx.fillText(last.label.slice(2,22), bx, by+r+14); // quitar emoji del inicio si es muy largo
    }

    // Contador de acciones del jugador hasta "ahora"
    const totalActs=S.events.filter(e=>e.pid===p.id&&e.t<=t&&e.cat==='train').length;
    if(totalActs>0){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.font=`9px system-ui,sans-serif`;
      ctx.fillText(`×${totalActs}`, bx+r+3, by-r+3);
    }
  }

  // Timestamp en la esquina
  ctx.fillStyle='rgba(212,168,64,.4)';
  ctx.font='11px Consolas,monospace';
  ctx.textAlign='left';
  ctx.fillText(fmtMs(t), 10, H-10);
}

// ══════════════════════════════════════════════════════
// ZOOM & PAN
// ══════════════════════════════════════════════════════
function applyZoom(delta, cx, cy){
  const f=delta>0?1.18:1/1.18;
  const nz=Math.min(10, Math.max(.15, S.zoom*f));
  S.px=cx-(cx-S.px)*(nz/S.zoom);
  S.py=cy-(cy-S.py)*(nz/S.zoom);
  S.zoom=nz;
  draw();
}

ca.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  applyZoom(-e.deltaY, e.clientX-r.left, e.clientY-r.top);
},{passive:false});

ca.addEventListener('mousedown',e=>{
  S.drag=true; S.dsx=e.clientX; S.dsy=e.clientY; S.dpx=S.px; S.dpy=S.py;
});
window.addEventListener('mousemove',e=>{
  if(!S.drag) return;
  S.px=S.dpx+(e.clientX-S.dsx);
  S.py=S.dpy+(e.clientY-S.dsy);
  draw();
});
window.addEventListener('mouseup',()=>S.drag=false);

document.getElementById('zin') .addEventListener('click',()=>applyZoom( 1,cv.width/2,cv.height/2));
document.getElementById('zout').addEventListener('click',()=>applyZoom(-1,cv.width/2,cv.height/2));
document.getElementById('zres').addEventListener('click',()=>{S.zoom=1;S.px=0;S.py=0;draw();});

document.getElementById('fsb').addEventListener('click',()=>{
  document.fullscreenElement
    ? document.exitFullscreen()
    : document.getElementById('carea').requestFullscreen().catch(()=>{});
});
document.addEventListener('fullscreenchange',()=>setTimeout(()=>{resizeCanvas();draw();},60));

// TIMELINE
// ══════════════════════════════════════════════════════
const fmtMs=ms=>{
  const s=Math.floor(Math.max(0,ms)/1e3), m=Math.floor(s/60);
  return`${m}:${(s%60).toString().padStart(2,'0')}`;
};

function renderTL(){
  const f=S.dur?S.ct/S.dur:0;
  document.getElementById('sfill').style.width=(f*100).toFixed(3)+'%';
  document.getElementById('tltime').textContent=`${fmtMs(S.ct)} / ${fmtMs(S.dur)}`;
  const sl=document.getElementById('seek');
  if(document.activeElement!==sl) sl.value=Math.round(f*10000);
}

// ══════════════════════════════════════════════════════
// RELOJ DE REPRODUCCIÓN
// ══════════════════════════════════════════════════════
let lastTs=null;
function tick(ts){
  if(S.playing && S.loaded){
    if(lastTs!==null){
      S.ct=Math.min(S.dur, S.ct+(ts-lastTs)*S.speed);
      if(S.ct>=S.dur){
        S.ct=S.dur; S.playing=false;
        document.getElementById('pp').textContent='▶';
      }
    }
    lastTs=ts;
    renderTL(); draw();
  } else {
    lastTs=null;
  }
  requestAnimationFrame(tick);
}

// CARGA DE ARCHIVO

async function loadFile(file){
  const st=document.getElementById('status');
  const em=document.getElementById('errmsg');
  em.textContent='';
  st.textContent=`Cargando ${file.name}…`;
  try{
    const r=await parseW3G(file);
    S.dur=r.dur; S.players=r.players; S.events=r.events;
    S.ct=0; S.playing=false; S.loaded=true;
    calcBases(r.players);
    // Arrancar con la cámara enfocada en la base del primer jugador,
    // el usuario puede alejar el zoom con la rueda para ver el mapa completo.
    const firstBase=S.bases[r.players[0]?.id];
    if(firstBase){
      S.zoom=4;
      S.px=cv.width/2-firstBase.fx*cv.width*S.zoom;
      S.py=cv.height/2-firstBase.fy*cv.height*S.zoom;
    }
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('pp').textContent='▶';
    renderTL(); draw();
    st.textContent=`${file.name} · ${fmtMs(r.dur)} · ${r.players.length} jugadores · ${r.events.length} acciones SC`;
    if(r.events.length===0)
      em.textContent='ℹ Sin eventos detectados — abrí F12 → Console para ver detalles del parser';
  } catch(e){
    st.textContent='';
    em.textContent='⚠ Error: '+e.message;
    console.error('[W3G] Error al parsear:',e);
  }
}

// ══════════════════════════════════════════════════════
// CONTROLES UI
// ══════════════════════════════════════════════════════
document.getElementById('openbtn').addEventListener('click',()=>document.getElementById('fi').click());
document.getElementById('fi').addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f)loadFile(f);});

document.getElementById('pp').addEventListener('click',()=>{
  if(!S.loaded) return;
  S.playing=!S.playing;
  document.getElementById('pp').textContent=S.playing?'⏸':'▶';
});

document.getElementById('seek').addEventListener('input',e=>{
  if(!S.loaded) return;
  S.ct=(e.target.value/10000)*S.dur;
  renderTL(); draw();
});

document.getElementById('sg').addEventListener('click',e=>{
  const b=e.target.closest('.sb'); if(!b) return;
  S.speed=Number(b.dataset.s);
  document.querySelectorAll('.sb').forEach(x=>x.classList.toggle('on',x===b));
});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.code==='Space'){e.preventDefault();document.getElementById('pp').click();}
  if(e.code==='ArrowLeft') {S.ct=Math.max(0,S.ct-(e.shiftKey?30000:5000));renderTL();draw();}
  if(e.code==='ArrowRight'){S.ct=Math.min(S.dur,S.ct+(e.shiftKey?30000:5000));renderTL();draw();}
});

window.addEventListener('resize',()=>{resizeCanvas();draw();});

// Init
resizeCanvas();
draw();
requestAnimationFrame(tick);
</script>
</body>
</html>
